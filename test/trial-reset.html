<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Trial Reset — Nav It</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Inter',system-ui,sans-serif;background:#080f18;color:#fff;
     display:flex;flex-direction:column;align-items:center;justify-content:center;
     min-height:100vh;padding:24px;gap:12px}
h2{font-size:16px;font-weight:700;color:#f0a040;letter-spacing:0.5px}
p{font-size:12px;color:rgba(255,255,255,0.4);text-align:center;margin-bottom:8px}
.btn{border:none;border-radius:10px;color:#fff;font-family:inherit;font-size:13px;
     font-weight:700;padding:13px 0;cursor:pointer;width:240px;text-align:center}
.blue  {background:#2e86ab}
.orange{background:#e07b30}
.green {background:#1e8c78}
.gray  {background:#3a4a5a}
.open  {background:#f0a040;color:#080f18;margin-top:8px}
.status{font-size:12px;color:#5bb8d4;min-height:18px;text-align:center}
hr{border:none;border-top:1px solid rgba(255,255,255,0.1);width:240px}
</style>
</head>
<body>
<h2>Trial Screen Tester</h2>
<p>Drop in www\ alongside index.html<br>Remove before publishing</p>
<hr>
<button class="btn blue"   onclick="set('new')">Show Welcome screen</button>
<button class="btn orange" onclick="set('expired')">Show Paywall screen</button>
<button class="btn green"  onclick="set('subscribed')">Subscribed (no screen)</button>
<button class="btn gray"   onclick="set('clear')">Clear all / reset</button>
<div class="status" id="s"></div>
<hr>
<button class="btn open" onclick="location.href='../index.html'">Open App →</button>
<script>
const T='sailing_trial_start',S='sailing_subscribed';
const msgs={new:'New user — Welcome screen',expired:'Expired — Paywall screen',
            subscribed:'Subscribed — no screen',clear:'Cleared all data'};
function set(m){
  if(m==='new'||m==='clear'){localStorage.removeItem(T);localStorage.removeItem(S);}
  else if(m==='expired'){localStorage.setItem(T,String(Date.now()-15*24*60*60*1000));localStorage.removeItem(S);}
  else if(m==='subscribed'){localStorage.setItem(S,'true');}
  document.getElementById('s').textContent='✓ '+msgs[m];
}
</script>
</body>
</html>
